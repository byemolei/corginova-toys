<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorgiNova 后台管理</title>
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <header class="admin-header">
      <div>
        <p class="eyebrow">店铺后台</p>
        <h1>CorgiNova 管理后台</h1>
      </div>
      <div class="header-actions">
        <a href="../index.html" target="_blank" rel="noreferrer">查看网站</a>
        <button type="button" data-sign-out hidden>退出登录</button>
      </div>
    </header>

    <main>
      <section class="panel login-panel" data-login-panel>
        <h2>管理员登录</h2>
        <p>请输入你的后台用户名和密码。</p>
        <form data-login-form>
          <label>
            用户名
            <input name="username" autocomplete="username" required>
          </label>
          <label>
            密码
            <input type="password" name="password" autocomplete="current-password" required>
          </label>
          <button type="submit">登录</button>
        </form>
      </section>

      <section class="admin-shell" data-admin-shell hidden>
        <section class="panel token-panel">
          <div>
            <p class="eyebrow">发布权限</p>
            <h2>GitHub Token</h2>
            <p class="help-text">必填。粘贴带有 Contents 读写权限的 GitHub token。它只保存在当前浏览器里，用来保存商品和上传图片。</p>
          </div>
          <div class="token-row">
            <input type="password" data-token-input placeholder="github_pat_...">
            <button type="button" data-save-token>保存 token</button>
          </div>
        </section>

        <nav class="tabs" aria-label="Admin sections">
          <button class="active" type="button" data-tab="products">商品管理</button>
          <button type="button" data-tab="settings">联系方式与付款</button>
        </nav>

        <section class="tab-panel active" data-panel="products">
          <div class="section-title">
            <div>
              <p class="eyebrow">商品列表</p>
              <h2>商品管理</h2>
            </div>
            <button type="button" data-new-product>新增商品</button>
          </div>

          <div class="product-layout">
            <div class="panel">
              <div class="product-list" data-product-list></div>
            </div>

            <form class="panel editor" data-product-form>
              <input type="hidden" name="id">
              <div class="form-grid">
                <label>
                  商品名称 *
                  <input name="name" required>
                </label>
                <label>
                  分类 *
                  <select name="category">
                    <option value="chew">咀嚼玩具</option>
                    <option value="tug">拔河玩具</option>
                    <option value="puzzle">益智玩具</option>
                    <option value="bundle">套装</option>
                    <option value="plush">毛绒玩具</option>
                    <option value="sale">促销</option>
                  </select>
                </label>
                <label>
                  价格 *
                  <input name="price" type="number" min="0" step="0.01" required>
                </label>
                <label>
                  排序
                  <input name="sort_order" type="number" step="1">
                </label>
                <label>
                  小标签
                  <input name="tag" placeholder="例如：日常咀嚼 / 新品推荐">
                </label>
                <label>
                  图片角标 / 活动
                  <input name="badge" placeholder="例如：新品 / 热卖 / 限时活动">
                </label>
                <label>
                  促销标签
                  <input name="sale_label" placeholder="例如：8折 / 买二送一">
                </label>
                <label>
                  图片说明
                  <input name="image_alt" placeholder="给搜索引擎和无障碍阅读使用">
                </label>
              </div>

              <label>
                商品描述
                <textarea name="description" rows="4"></textarea>
              </label>

              <div class="image-row">
                <label>
                  图片地址
                  <input name="image_url" placeholder="可留空后直接上传图片，或填 assets/xxx.png">
                </label>
                <label class="upload-box">
                  上传商品图片
                  <input name="image_file" type="file" accept="image/*">
                </label>
              </div>

              <div class="checks">
                <label><input name="is_featured" type="checkbox"> 大卡片展示</label>
                <label><input name="is_active" type="checkbox" checked> 在网站显示</label>
              </div>

              <div class="form-actions">
                <button type="submit">保存商品</button>
                <button class="danger" type="button" data-delete-product>删除商品</button>
              </div>
            </form>
          </div>
        </section>

        <section class="tab-panel" data-panel="settings">
          <form class="panel editor" data-settings-form>
            <div class="section-title">
              <div>
                <p class="eyebrow">店铺信息</p>
                <h2>联系方式与付款</h2>
              </div>
              <button type="submit">保存设置</button>
            </div>

            <div class="form-grid">
              <label>
                店铺名称 *
                <input name="business_name" required>
              </label>
              <label>
                下单邮箱 *
                <input name="order_email" type="email" required>
              </label>
              <label>
                发货地区 *
                <input name="ships_from" required>
              </label>
              <label>
                联系区标题 *
                <input name="contact_heading" required>
              </label>
            </div>
            <label>
              联系区说明 *
              <textarea name="contact_body" rows="4" required></textarea>
            </label>
            <label>
              付款方式 *
              <textarea name="payment_methods" rows="4" required></textarea>
            </label>
          </form>
        </section>
      </section>
    </main>

    <div class="toast" data-toast></div>
    <script src="admin-config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
